name: Frontend CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    name: 🏗️ Build & 🚀 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.emaar.sd

      - name: 📂 Deploy dist to FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: emaar.sd
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          local-dir: ./dist/
          server-dir: /public_html/emaar.sd/
